<div class="mobile-overlay" id="mobileOverlay"></div>

  <main class="contact-page">
    <div class="container contact-wrap">
      <h2 class="contact-heading">GET IN TOUCH</h2>
<div class="form-line"></div>
<p class="contact-tagline">Supposed to be saving lives, but currently saving files 👀</p>

      <form class="contact-form">
        <div class="form-row">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Your secret identity">
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="I promise I won't spam you">
          </div>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Your message goes here. Ask me anything"></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Email →</button>
      </form>

      <div class="email-divider"></div>

      <div class="email-row">
        <div class="email-box">
          <i class="fa-solid fa-envelope" style="margin-right: 12px;"></i>
          Email: seliindoris@gmail.com
        </div>
        <button class="copy-btn" id="copyEmailBtn" type="button">
          <i class="fa-regular fa-copy"></i>
        </button>
      </div>
    </div>
  </main>
